<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.url == "/" %}docflow — ADR-driven documentation workflow{% else %}{{ page.title }} · docflow{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <!-- Open Graph / Twitter card (social previews) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="docflow">
  <meta property="og:title" content="{% if page.url == '/' %}docflow — ADR-driven documentation workflow{% else %}{{ page.title }} · docflow{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/preview.png' | absolute_url }}?v=2">
  <meta property="og:image:width" content="1736">
  <meta property="og:image:height" content="906">
  <meta property="og:image:alt" content="docflow — repository hubs linked by Architecture Decision Records">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == '/' %}docflow — ADR-driven documentation workflow{% else %}{{ page.title }} · docflow{% endif %}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ '/preview.png' | absolute_url }}?v=2">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="alternate icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon-180.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="hero{% if page.url != '/' %} hero--slim{% endif %}">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-logo" aria-hidden="true"><img src="{{ '/assets/repository_hub_logo.png' | relative_url }}" alt=""></span>
        <span class="brand-word">docflow</span>
      </a>
      {% if page.url == "/" %}
        <p class="tagline">{{ site.description }}</p>
        <div class="cta">
          <a class="btn btn--primary" href="https://github.com/EvolveHQ/docflow">View on GitHub</a>
          <a class="btn" href="{{ '/methodology/' | relative_url }}">Methodology</a>
          <a class="btn" href="{{ '/examples/' | relative_url }}">Examples</a>
          <a class="btn" href="#install">Install</a>
        </div>
      {% endif %}
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span>MIT licensed · maintained by <a href="https://github.com/EvolveHQ">EvolveHQ</a></span>
      <span class="footer-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/methodology/' | relative_url }}">Methodology</a>
        <a href="{{ '/examples/' | relative_url }}">Examples</a>
        <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a href="https://github.com/EvolveHQ/docflow">GitHub</a>
      </span>
    </div>
  </footer>
</body>
</html>
